server:
  port: ${SERVER_PORT:27403}
  compression:
    enabled: true
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/svg+xml
    min-response-size: 1024

spring:
  application:
    name: ai-apm-web
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          cache-public: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

apm:
  cluster:
    enabled: false
    node-id: web-1
    zookeeper:
      connect-string: ${APM_CLUSTER_ZOOKEEPER_CONNECT_STRING:${ZK_CONNECT_STRING:}}
  # node.worker-id: 1  # optional snowflake worker id (0-1023); defaults to hostname hash
  doris:
    fe-host: ${DORIS_FE_HOST:127.0.0.1}
    fe-query-port: ${DORIS_FE_QUERY_PORT:9030}
    fe-http-port: ${DORIS_FE_HTTP_PORT:8030}
    config-database: databuff
    metric-database: databuff
    trace-database: databuff
    username: ${DORIS_USER:root}
    password: ${DORIS_PASSWORD:}
    availability:
      probe-interval-ms: ${DORIS_AVAILABILITY_PROBE_INTERVAL_MS:60000}
      connect-timeout-ms: ${DORIS_AVAILABILITY_CONNECT_TIMEOUT_MS:3000}
      socket-timeout-ms: ${DORIS_AVAILABILITY_SOCKET_TIMEOUT_MS:3000}
  security:
    seed-username: admin
    seed-password: Databuff@123
    jwt:
      secret: dev-secret
      expiration-seconds: 3600
  alarm:
    lookback-minutes: 5
    evaluation-cron: "0 * * * * ?"
  monitor:
    pool:
      core-size: 4
      max-size: 16
      queue-size: 100
  ai:
    lookback-minutes: 15
    provider:
      mask-api-key: true
  agent:
    agentscope-enabled: ${APM_AGENT_AGENTSCOPE_ENABLED:true}
    builtin-skills-dir: ${APM_BUILTIN_SKILLS_DIR:../deploy/common/skills}
    custom-skills-dir: ${APM_CUSTOM_SKILLS_DIR:./data/skills}
    workspace-dir: ${APM_DATA_DIR:./data}/ai-workspaces
    workspace-shell-commands: cat,head,tail,grep,wc,ls,file,python3
    workspace-shell-timeout-seconds: 60
    # 在内置危险命令 denylist 之外追加拦截。逗号分隔，两种写法：
    #   1) 直接写命令名 → 整词拦截该命令（任何形态），如 nc、tcpdump
    #   2) 以 re: 开头 → 按正则匹配，用于只禁某种形态不禁整条命令，如 re:\bchmod\s+777\b
    # 示例: nc,tcpdump,re:\bchmod\s+777\b,re:\bkill\s+-9\s+-1\b
    shell-command-denylist: ${APM_AGENT_SHELL_DENYLIST:}
    max-iters: ${APM_AGENT_MAX_ITERS:1000}
    llm-http-timeout-seconds: ${APM_AGENT_LLM_HTTP_TIMEOUT_SECONDS:300}
    expert-round-timeout-seconds: ${APM_AGENT_EXPERT_ROUND_TIMEOUT_SECONDS:1200}
    brain-agent-name: brain
    data-agent-name: data
    inspection-agent-name: inspection
